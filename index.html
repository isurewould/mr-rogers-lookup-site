<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mr. Rogers Lookup</title>
    <meta name="description" content="Search Mister Rogers' Neighborhood episodes by keyword or sentence.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="page-glow" aria-hidden="true"></div>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-copy">
                <p class="brand-mark">Mr. Rogers Lookup</p>
                <p class="brand-copy">Search by word or sentence to find the right episode fast.</p>
            </div>
        </div>
    </header>

    <main class="app-shell">
        <section class="search-panel">
            <form class="search-bar" id="searchForm" autocomplete="off">
                <label class="search-field" for="searchInput">
                    <span class="visually-hidden">Search episodes</span>
                    <input id="searchInput" name="q" type="search" placeholder="Try: haircut, going to the dentist, deals with his emotions" inputmode="search">
                </label>
                <button class="result-action search-clear-button" id="clearQueryButton" type="button">Clear</button>
            </form>
        </section>

        <section class="results-shell">
            <div class="results-toolbar" id="resultsToolbar" hidden>
                <div>
                    <p class="results-label">Results</p>
                    <h1 id="resultsSummary"></h1>
                    <p class="results-hint" id="resultsHint"></p>
                </div>
            </div>

            <div class="results-list" id="resultsList" aria-live="polite"></div>
        </section>
    </main>

    <script src="assets/vendor/jquery-3.7.1.min.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
